name: Daily Auto Commit

on:
  schedule:
    # Har roz 3:00 PM UTC = 8:30 PM IST
    - cron: '30 15 * * *'
  workflow_dispatch: # Manual trigger bhi kar sakte ho

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.email "sarthakkumar993@gmail.com"
          git config user.name "sar4567655645"

      - name: Make daily commit
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M')
          echo "Contribution: $DATE" >> README.md
          echo "" >> README.md
          git add README.md
          git commit -m "Contribution: $DATE"

      - name: Push changes
        run: git push origin main
